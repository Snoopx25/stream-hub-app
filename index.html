<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Hub - Snoopx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DEFAULTS = [
            { id: 1, time: "20:00", title: "Just Chatting" },
            { id: 2, time: "21:00", title: "Fortnite Ranked" },
            { id: 3, time: "23:00", title: "Diablo IV" },
        ];

        function App() {
            const [isLive, setIsLive] = useState(false);
            const [blocks, setBlocks] = useState(DEFAULTS);
            const [streamTitle, setStreamTitle] = useState("Thursday Night Grind 🎮");
            const [profit, setProfit] = useState(0);
            const [runtimeSec, setRuntimeSec] = useState(0);
            const [viewers, setViewers] = useState(312);
            const [subs, setSubs] = useState(0);
            const [tips, setTips] = useState(0);
            const nextId = useRef(10);

            const STREAM_DURATION = 180 * 60;

            useEffect(() => {
                if (!isLive) return;
                const profitTimer = setInterval(() => {
                    setProfit((p) => p + 240 + Math.floor(Math.random() * 180));
                    setViewers((v) => Math.max(50, v + Math.floor(Math.random() * 11) - 5));
                }, 2000);
                const secTimer = setInterval(() => {
                    setRuntimeSec((s) => s + 1);
                }, 1000);
                const subTimer = setInterval(() => {
                    setSubs((s) => s + 1);
                    setTips((t) => t + 100 + Math.floor(Math.random() * 900));
                }, 23000);
                return () => {
                    clearInterval(profitTimer);
                    clearInterval(secTimer);
                    clearInterval(subTimer);
                };
            }, [isLive]);

            function goLive() {
                setIsLive(true);
                setProfit(0);
                setRuntimeSec(0);
                setSubs(0);
                setTips(0);
                setViewers(312);
            }

            function stopLive() {
                setIsLive(false);
            }

            function addBlock() {
                const last = blocks[blocks.length - 1];
                const [h, m] = last ? last.time.split(":").map(Number) : [20, 0];
                const nh = (h + 1) % 24;
                setBlocks([
                    ...blocks,
                    { id: nextId.current++, time: `${String(nh).padStart(2, "0")}:${String(m).padStart(2, "0")}`, title: "New Segment" },
                ]);
            }

            function deleteBlock(id) {
                setBlocks(blocks.filter((b) => b.id !== id));
            }

            function updateBlock(id, field, value) {
                setBlocks(blocks.map((b) => (b.id === id ? { ...b, [field]: value } : b)));
            }

            const planProgress = Math.min(100, Math.round(((streamTitle ? 1 : 0) + Math.min(blocks.length, 4)) / 5 * 100));
            const runtimePct = Math.min(100, Math.round((runtimeSec / STREAM_DURATION) * 100));

            const segIdx = Math.min(Math.floor(runtimeSec / 60 / (180 / Math.max(blocks.length, 1))), blocks.length - 1);
            const currentSeg = blocks[segIdx]?.title ?? "—";
            const nextSeg = blocks[segIdx + 1]?.title ?? "—";

            const hh = Math.floor(runtimeSec / 3600);
            const mm = Math.floor(runtimeSec / 60) % 60;
            const ss = runtimeSec % 60;
            const runtimeStr = hh > 0
                ? `${hh}:${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}`
                : `${mm}:${String(ss).padStart(2, "0")}`;

            return (
                <div className="min-h-screen bg-[#06060f] flex items-start justify-center py-8 px-4 font-sans text-slate-100">
                    <div className="w-full max-w-[390px] min-h-[800px] bg-[#0a0a14] rounded-[44px] border border-white/10 overflow-hidden relative flex flex-col shadow-2xl">
                        {/* Status Bar */}
                        <div className="flex justify-between items-center px-8 pt-6 pb-2 text-[12px] text-white/30">
                            <span>9:41</span>
                            <div className="flex gap-2"><span>●</span><span>●</span><span>▲</span></div>
                        </div>

                        {!isLive ? (
                            <div className="flex flex-col flex-1 p-6 space-y-6">
                                <div>
                                    <p className="text-[10px] tracking-widest text-white/30 uppercase mb-1">Stream Hub</p>
                                    <h1 className="text-2xl font-bold">Pre-Live Planner</h1>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] text-white/30 uppercase tracking-wider">Stream Title</label>
                                    <input
                                        value={streamTitle}
                                        onChange={(e) => setStreamTitle(e.target.value)}
                                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-violet-500/50 transition-all"
                                    />
                                </div>

                                <div className="bg-white/5 border border-white/10 rounded-2xl p-4">
                                    <div className="flex justify-between mb-2">
                                        <span className="text-xs text-white/50">Progress</span>
                                        <span className="text-xs font-bold text-violet-400">{planProgress}%</span>
                                    </div>
                                    <div className="h-1.5 bg-white/10 rounded-full overflow-hidden">
                                        <div className="h-full bg-violet-500 transition-all duration-700" style={{ width: `${planProgress}%` }} />
                                    </div>
                                </div>

                                <div className="flex-1 space-y-3">
                                    <div className="flex justify-between items-center">
                                        <p className="text-[10px] text-white/30 uppercase tracking-wider">Schedule</p>
                                        <button onClick={addBlock} className="text-[11px] bg-violet-500/20 text-violet-300 px-3 py-1.5 rounded-lg">+ Add</button>
                                    </div>
                                    <div className="space-y-2 overflow-y-auto max-h-[300px]">
                                        {blocks.map((b) => (
                                            <div key={b.id} className="flex gap-3 bg-white/5 border border-white/10 rounded-xl p-3 items-center group">
                                                <input value={b.time} onChange={(e) => updateBlock(b.id, "time", e.target.value)} className="bg-violet-500/20 text-violet-300 text-xs font-bold w-14 text-center rounded-lg p-1 outline-none" />
                                                <input value={b.title} onChange={(e) => updateBlock(b.id, "title", e.target.value)} className="flex-1 bg-transparent text-sm outline-none" />
                                                <button onClick={() => deleteBlock(b.id)} className="text-white/20 hover:text-red-400">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={goLive} className="w-full py-4 rounded-2xl bg-red-600 hover:bg-red-500 font-bold shadow-lg shadow-red-900/20 transition-all">● GO LIVE</button>
                            </div>
                        ) : (
                            <div className="flex flex-col flex-1 p-6 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h1 className="text-2xl font-bold">Live Dashboard</h1>
                                    <span className="bg-red-500/20 text-red-400 text-[10px] font-bold px-3 py-1 rounded-full animate-pulse border border-red-500/30">LIVE</span>
                                </div>

                                <div className="bg-white/5 border border-red-500/20 rounded-3xl p-6 text-center">
                                    <p className="text-[10px] text-white/30 uppercase tracking-widest mb-2">Live Profit Today</p>
                                    <p className="text-4xl font-bold text-emerald-400">¥{profit.toLocaleString()}</p>
                                    <p className="text-xs text-white/30 mt-2">Uptime: <span className="text-white/60">{runtimeStr}</span></p>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-red-500/10 border border-red-500/20 rounded-2xl p-4">
                                        <p className="text-[9px] text-red-400 uppercase font-bold mb-1">Now</p>
                                        <p className="text-sm font-bold truncate">{currentSeg}</p>
                                    </div>
                                    <div className="bg-white/5 border border-white/10 rounded-2xl p-4">
                                        <p className="text-[9px] text-white/30 uppercase font-bold mb-1">Next</p>
                                        <p className="text-sm font-bold truncate">{nextSeg}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-2 flex-1">
                                    {[
                                        { l: "Viewers", v: viewers, c: "text-blue-400" },
                                        { l: "Subs", v: subs, c: "text-emerald-400" },
                                        { l: "Tips", v: `¥${tips}`, c: "text-amber-400" },
                                        { l: "Chat/m", v: Math.round(viewers/12), c: "text-purple-400" },
                                        { l: "Clips", v: Math.floor(runtimeSec/100), c: "text-pink-400" },
                                        { l: "Cheers", v: Math.floor(runtimeSec/45), c: "text-rose-400" }
                                    ].map(i => (
                                        <div key={i.l} className="bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col justify-center items-center">
                                            <p className={`text-lg font-bold ${i.c}`}>{i.v}</p>
                                            <p className="text-[9px] text-white/30 uppercase">{i.l}</p>
                                        </div>
                                    ))}
                                </div>

                                <button onClick={stopLive} className="w-full py-4 rounded-2xl bg-white/10 text-white/60 font-bold hover:bg-white/20 transition-all">■ STOP STREAM</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
